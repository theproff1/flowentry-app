<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FlowEntry — Liquidity Flow Detection</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08090d;--card:#111318;--card-alt:#161920;--border:#1e2230;
  --gold:#c9a227;--gold-light:#e8c84a;--gold-dim:#a0841e;
  --green:#22c55e;--green-dim:#166534;--red:#ef4444;--red-dim:#7f1d1d;
  --text:#e4e4e7;--text-dim:#71717a;--text-mid:#a1a1aa;
  --blue:#3b82f6;--purple:#8b5cf6;
  --accent1:rgba(201,162,39,0.08);--accent2:rgba(201,162,39,0.15);
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;line-height:1.4}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
table{width:100%;border-collapse:collapse}

/* Header */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer}
.logo-icon{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:var(--bg)}
.logo-text{font-size:16px;font-weight:800;color:var(--gold);letter-spacing:-0.3px}
.nav{display:flex;gap:1px;flex-wrap:wrap;justify-content:center;flex:1;margin:0 8px}
.nav-btn{background:transparent;color:var(--text-dim);border:none;padding:5px 9px;border-radius:6px;font-size:11px;font-weight:500;transition:all 0.2s;white-space:nowrap}
.nav-btn.active{background:var(--accent2);color:var(--gold);font-weight:700}
.lang-btn{background:var(--accent1);color:var(--gold);border:1px solid rgba(201,162,39,0.2);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:600;white-space:nowrap}
.container{max-width:960px;margin:0 auto;padding:20px 16px}

/* Page sections */
.page{display:none}.page.active{display:block}

/* Pill */
.pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:0.3px;white-space:nowrap;display:inline-block}

/* Stat Box */
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 16px;text-align:center;flex:1;min-width:120px}
.stat-box.big{padding:28px 20px;min-width:150px}
.stat-val{font-size:26px;font-weight:800;color:var(--gold);letter-spacing:-1px;line-height:1.1}
.stat-box.big .stat-val{font-size:36px}
.stat-label{font-size:12px;font-weight:600;color:var(--text);margin-top:6px;letter-spacing:0.5px}
.stat-sub{font-size:11px;color:var(--text-dim);margin-top:3px}

/* Benefit Card */
.benefit-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 16px;flex:1 1 calc(33% - 8px);min-width:170px}
.benefit-icon{font-size:26px;margin-bottom:8px}
.benefit-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:5px}
.benefit-desc{font-size:12px;color:var(--text-dim);line-height:1.5}

/* Section Title */
.section-title{text-align:center;padding:24px 0 16px}
.section-tag{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:3px;margin-bottom:8px;text-transform:uppercase}
.section-main{font-size:26px;font-weight:900;margin:0 0 6px;color:var(--text)}
.section-sub{font-size:13px;color:var(--text-dim);margin:0 auto;max-width:560px}

/* Flex helpers */
.flex{display:flex}.flex-wrap{flex-wrap:wrap}.gap-8{gap:8px}.gap-10{gap:10px}.gap-12{gap:12px}.gap-14{gap:14px}
.justify-center{justify-content:center}.items-center{align-items:center}
.text-center{text-align:center}.mb-4{margin-bottom:4px}.mb-8{margin-bottom:8px}.mb-10{margin-bottom:10px}.mb-14{margin-bottom:14px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}.mb-24{margin-bottom:24px}.mb-28{margin-bottom:28px}

/* Trade Card */
.trade-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;flex:1 1 calc(33% - 8px);min-width:200px}
.watch-card{background:var(--card);border:1px solid rgba(201,162,39,0.13);border-radius:10px;padding:10px 14px;flex:1 1 calc(33% - 6px);min-width:180px}

/* Elite note */
.elite-note{background:var(--accent1);border:1px solid rgba(201,162,39,0.13);border-radius:8px;padding:8px 14px;text-align:center;margin-top:8px}
.elite-note span{font-size:11px;color:var(--gold);font-weight:600}

/* Live dot */
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.live-dot.ok{background:var(--green);animation:pulse 2s infinite}
.live-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* Table */
.data-table{font-size:12px}
.data-table th{padding:10px 8px;text-align:left;color:var(--text-dim);border-bottom:2px solid var(--border);font-size:11px;font-weight:600;white-space:nowrap;user-select:none}
.data-table th.sortable{cursor:pointer}
.data-table th.sorted{color:var(--gold)}
.data-table td{padding:8px 10px}
.data-table tr:nth-child(even){background:rgba(17,19,24,0.27)}
.data-table tr:hover{background:var(--accent1)}

/* Progress bar (detection) */
.det-bar{width:50px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px}
.det-fill{height:100%;border-radius:3px}

/* FAQ */
.faq-item{border-bottom:1px solid var(--border)}
.faq-q{padding:16px 0;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.faq-q span:first-child{font-size:14px;font-weight:600;color:var(--text);padding-right:16px}
.faq-toggle{color:var(--gold);font-size:18px;transition:transform 0.2s;flex-shrink:0}
.faq-a{font-size:13px;color:var(--text-dim);line-height:1.7;padding-bottom:16px;display:none}
.faq-item.open .faq-a{display:block}
.faq-item.open .faq-toggle{transform:rotate(45deg)}

/* How step */
.how-step{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:10px;display:flex;gap:16px;align-items:flex-start}
.how-icon{width:48px;height:48px;border-radius:12px;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.step-badge{background:var(--gold);color:var(--bg);font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px;display:inline-block;margin-right:8px}

/* Pricing */
.price-card{background:var(--card);border-radius:16px;padding:24px;flex:1 1 280px;max-width:360px}
.price-card.elite{border:1px solid var(--gold);position:relative;box-shadow:0 0 30px rgba(201,162,39,0.08)}
.price-card.free{border:1px solid var(--border)}
.best-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--bg);font-size:10px;font-weight:800;padding:3px 14px;border-radius:20px;letter-spacing:1px}

/* Sim button */
.sim-btn{border-radius:10px;padding:12px 24px;font-size:16px;font-weight:800;border:1px solid var(--border);background:var(--card);color:var(--text-dim);transition:all 0.2s}
.sim-btn.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}

/* Tab button */
.tab-btn{background:transparent;color:var(--text-dim);border:1px solid var(--border);padding:7px 18px;border-radius:8px;font-size:12px;font-weight:500;transition:all 0.2s}
.tab-btn.active{background:var(--accent2);color:var(--gold);border-color:rgba(201,162,39,0.27);font-weight:700}

/* Search */
.search-input{flex:1;min-width:160px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-size:13px;outline:none}

/* Compare */
.compare-panel{background:var(--card-alt);border:1px solid rgba(201,162,39,0.2);border-radius:12px;padding:16px;margin-bottom:14px}
.compare-card{background:var(--card);border-radius:10px;padding:16px;min-width:180px;flex:1}

/* RTL */
[dir="rtl"] .faq-q span:first-child{padding-right:0;padding-left:16px}
[dir="rtl"] .step-badge{margin-right:0;margin-left:8px}
[dir="rtl"] .how-step{direction:rtl}

/* Footer */
.footer{border-top:1px solid var(--border);margin-top:40px;padding-top:20px;text-align:center}
.footer div:first-child{font-size:12px;color:var(--text-dim);margin-bottom:6px}
.footer div:last-child{font-size:11px;color:var(--text-dim);opacity:0.5}

/* Responsive */
@media(max-width:600px){
  .nav{gap:0;margin:0 4px}
  .nav-btn{padding:4px 6px;font-size:10px}
  .stat-box.big .stat-val{font-size:28px}
  .benefit-card{min-width:140px;flex:1 1 calc(50% - 6px)}
  .trade-card,.watch-card{min-width:100%;flex:1 1 100%}
}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Telegram Mini App */
.tg-loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s}
.tg-loading-overlay.hide{opacity:0;pointer-events:none}
.tg-loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.tg-access-badge{position:fixed;top:48px;right:12px;z-index:101;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:0.5px}
[dir="rtl"] .tg-access-badge{right:auto;left:12px}
.tg-access-badge.elite{background:rgba(201,162,39,0.15);color:var(--gold);border:1px solid rgba(201,162,39,0.3)}
.tg-access-badge.free{background:rgba(113,113,122,0.12);color:var(--text-dim);border:1px solid rgba(113,113,122,0.2)}
.tg-upgrade-banner{background:linear-gradient(135deg,#1a1510,var(--card));border:1px solid rgba(201,162,39,0.25);border-radius:12px;padding:14px 18px;margin-top:12px;display:flex;align-items:center;gap:12px;cursor:pointer}
.tg-upgrade-banner:hover{border-color:var(--gold)}
</style>
</head>
<body>

<!-- Telegram Mini App Loading Overlay -->
<div class="tg-loading-overlay" id="tgLoading">
  <div class="tg-loading-spinner"></div>
  <div style="font-size:14px;color:var(--text-dim)">Loading FlowEntry...</div>
</div>

<!-- Access Badge (shows Elite or Free) -->
<div class="tg-access-badge free" id="accessBadge" style="display:none"></div>

<!-- ===== HEADER ===== -->
<div class="header" id="header">
  <div class="logo" onclick="goPage(0)">
    <div class="logo-icon">F</div>
    <span class="logo-text">FlowEntry</span>
  </div>
  <div class="nav" id="nav"></div>
  <button class="lang-btn" id="langBtn" onclick="toggleLang()"></button>
</div>

<div class="container">

<!-- ===== PAGE 0: OVERVIEW ===== -->
<div class="page" id="page0">
  <div style="text-align:center;padding:28px 0 20px">
    <div class="section-tag" data-t="heroTag"></div>
    <h1 style="font-size:30px;font-weight:900;margin:0 0 10px;line-height:1.15" data-t="heroTitle"></h1>
    <p style="font-size:15px;color:var(--text-dim);margin:0 auto;max-width:520px" data-t="heroSub"></p>
  </div>
  <div class="flex flex-wrap gap-10 mb-24" id="heroStats"></div>

  <!-- Funnel -->
  <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:24px;text-align:center">
    <div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:16px;letter-spacing:0.5px" data-t="funnelTitle"></div>
    <div id="funnel"></div>
  </div>

  <!-- Benefits -->
  <h2 style="font-size:18px;font-weight:800;text-align:center;margin-bottom:14px" data-t="benefitsTitle"></h2>
  <div class="flex flex-wrap gap-10 mb-24" id="benefits"></div>

  <!-- TV Indicators -->
  <div style="background:var(--accent1);border:1px solid rgba(201,162,39,0.13);border-radius:12px;padding:16px;margin-bottom:24px">
    <div style="font-size:13px;color:var(--gold);font-weight:600;margin-bottom:6px" data-t="tvTitle"></div>
    <div style="font-size:12px;color:var(--text-dim);line-height:1.6" data-t="tvDesc"></div>
  </div>

  <!-- Telegram CTA -->
  <div style="background:linear-gradient(135deg,var(--card),#141824);border:1px solid rgba(59,130,246,0.2);border-radius:14px;padding:20px;margin-bottom:28px;display:flex;gap:16px;align-items:center;flex-wrap:wrap">
    <div style="font-size:36px">📲</div>
    <div style="flex:1;min-width:200px">
      <div style="font-size:15px;font-weight:700;margin-bottom:4px" data-t="tgTitle"></div>
      <div style="font-size:12px;color:var(--text-dim);line-height:1.6" data-t="tgDesc"></div>
    </div>
    <a href="https://t.me/flowentry3" target="_blank" style="background:rgba(59,130,246,0.13);border:1px solid rgba(59,130,246,0.27);border-radius:10px;padding:10px 20px;text-align:center">
      <div style="font-size:12px;font-weight:700;color:var(--blue)" data-t="tgBtn"></div>
      <div style="font-size:10px;color:var(--text-dim);margin-top:2px">t.me/flowentry3</div>
    </a>
  </div>

  <!-- Live Trades -->
  <div class="mb-24">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <h2 style="font-size:18px;font-weight:800" data-t="liveTitle"></h2>
      <div style="font-size:10px;color:var(--text-dim);display:flex;align-items:center" id="liveStatus"></div>
    </div>
    <p style="font-size:12px;color:var(--text-dim);margin-bottom:14px" data-t="liveSub"></p>
    <div class="flex flex-wrap gap-10 mb-8" id="liveTradesContainer"></div>
    <div id="liveTradesNote"></div>
    <h3 style="font-size:14px;font-weight:700;color:var(--gold);margin:18px 0 10px" data-t="watchTitle"></h3>
    <div class="flex flex-wrap gap-8 mb-8" id="watchContainer"></div>
    <div id="watchNote"></div>
  </div>

  <!-- Closed Trades -->
  <h2 style="font-size:18px;font-weight:800;text-align:center;margin-bottom:4px" data-t="closedTitle"></h2>
  <p style="font-size:12px;color:var(--text-dim);text-align:center;margin-bottom:14px" data-t="closedSub"></p>
  <div style="overflow-x:auto" id="overviewTable"></div>
</div>

<!-- ===== PAGE 1: PULSE ===== -->
<div class="page" id="page1">
  <div class="section-title">
    <div class="section-tag" data-t="pulseTag"></div>
    <h1 class="section-main" data-t="pulseTitle"></h1>
    <p class="section-sub" data-t="pulseSub"></p>
  </div>
  <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px">
    <p style="font-size:14px;color:var(--text-dim);line-height:1.8" data-t="pulseDesc"></p>
  </div>
  <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:16px" data-t="pulseHow"></h3>
    <div id="pulseSteps"></div>
  </div>
  <h3 style="font-size:15px;font-weight:700;margin-bottom:12px" data-t="pulseRead"></h3>
  <div id="pulseColors"></div>
  <div style="background:var(--accent1);border:1px solid rgba(201,162,39,0.13);border-radius:12px;padding:16px;text-align:center;margin-top:20px">
    <div style="font-size:13px;color:var(--gold);font-weight:600" data-t="pulseTv"></div>
  </div>
  <div style="background:var(--card);border:1px solid rgba(139,92,246,0.2);border-radius:14px;padding:24px;margin-top:20px">
    <h3 style="font-size:15px;font-weight:700;color:var(--purple);margin-bottom:8px" data-t="srTitle"></h3>
    <p style="font-size:13px;color:var(--text-dim);line-height:1.7" data-t="srDesc"></p>
  </div>
</div>

<!-- ===== PAGE 2: COINS ===== -->
<div class="page" id="page2">
  <div class="section-title">
    <h1 class="section-main" data-t="coinsTitle"></h1>
    <p class="section-sub" data-t="coinsSub"></p>
  </div>
  <div class="flex flex-wrap gap-8 mb-14 items-center">
    <input class="search-input" id="coinSearch" oninput="renderCoins()" placeholder="">
    <button class="tab-btn active" id="tabTop30" onclick="setCoinTab('top30')"></button>
    <button class="tab-btn" id="tabAll" onclick="setCoinTab('all')"></button>
    <button class="tab-btn" id="compareBtn" style="display:none" onclick="toggleComparePanel()"></button>
  </div>
  <div id="comparePanel" style="display:none"></div>
  <div style="overflow-x:auto" id="coinTableContainer"></div>
  <div style="font-size:11px;color:var(--text-dim);margin-top:12px;text-align:center" id="coinNote"></div>
</div>

<!-- ===== PAGE 3: SIMULATOR ===== -->
<div class="page" id="page3">
  <div class="section-title">
    <h1 class="section-main" data-t="simTitle"></h1>
    <p class="section-sub" data-t="simSub"></p>
  </div>
  <div class="flex gap-8 justify-center mb-24" id="simButtons"></div>
  <div style="text-align:center;font-size:12px;color:var(--text-dim);margin-bottom:20px" data-t="simSelect"></div>
  <div class="flex flex-wrap gap-12 justify-center mb-28" id="simStats"></div>
  <div style="background:var(--card);border-radius:14px;padding:24px;margin-bottom:20px" id="simBars"></div>
  <p style="font-size:13px;color:var(--text-dim);line-height:1.7;text-align:center;max-width:560px;margin:0 auto 20px" data-t="simDesc"></p>
  <div style="background:rgba(127,29,29,0.13);border:1px solid rgba(239,68,68,0.13);border-radius:10px;padding:14px;text-align:center">
    <p style="font-size:11px;color:var(--red);margin:0;opacity:0.8" data-t="simWarn"></p>
  </div>
</div>

<!-- ===== PAGE 4: TRACK RECORD ===== -->
<div class="page" id="page4">
  <div class="section-title">
    <h1 class="section-main" data-t="trTitle"></h1>
    <p class="section-sub" data-t="trSub"></p>
  </div>
  <div class="flex flex-wrap gap-10 mb-20" id="trStats"></div>
  <div class="flex flex-wrap gap-10 mb-24">
    <div style="flex:1;min-width:200px;background:rgba(22,101,52,0.13);border:1px solid rgba(34,197,94,0.13);border-radius:10px;padding:14px;text-align:center">
      <div style="font-size:13px;color:var(--green);font-weight:700" data-t="trGreen"></div>
    </div>
    <div style="flex:1;min-width:200px;background:var(--accent1);border:1px solid rgba(201,162,39,0.13);border-radius:10px;padding:14px">
      <div style="font-size:13px;color:var(--gold);font-weight:700;margin-bottom:4px" data-t="trRawTitle"></div>
      <div style="font-size:11px;color:var(--text-dim);line-height:1.5" data-t="trRawDesc"></div>
    </div>
  </div>
  <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:14px" data-t="trMethod"></h3>
    <div id="trMethodSteps"></div>
  </div>
  <div style="overflow-x:auto" id="trTable"></div>
  <div style="font-size:11px;color:var(--text-dim);text-align:center;margin-top:12px" data-t="trLast"></div>
</div>

<!-- ===== PAGE 5: HOW TO USE ===== -->
<div class="page" id="page5">
  <div class="section-title">
    <div class="section-tag" data-t="howTag"></div>
    <h1 class="section-main" data-t="howTitle"></h1>
    <p class="section-sub" data-t="howSub"></p>
  </div>
  <div id="howSteps"></div>
  <div style="background:var(--card);border:1px solid rgba(139,92,246,0.2);border-radius:14px;padding:20px;margin-top:16px">
    <h3 style="font-size:15px;font-weight:700;color:var(--purple);margin-bottom:8px" data-t="howTvTitle"></h3>
    <p style="font-size:13px;color:var(--text-dim);line-height:1.7;margin-bottom:8px" data-t="howTvDesc"></p>
    <div class="flex flex-wrap gap-8" id="howTvItems"></div>
    <p style="font-size:12px;color:var(--text-dim);margin-top:10px" data-t="howTvNote"></p>
  </div>
</div>

<!-- ===== PAGE 6: PRICING ===== -->
<div class="page" id="page6">
  <div class="section-title">
    <div class="section-tag" data-t="priceTag"></div>
    <h1 class="section-main" data-t="priceTitle"></h1>
    <p class="section-sub" data-t="priceSub"></p>
  </div>
  <div class="flex flex-wrap gap-14 mb-28 justify-center" id="priceCards"></div>
  <!-- Founder -->

// ==========================================
// CSV PARSER
// ==========================================
function parseCSV(text){
  const lines=text.trim().split("\n");if(lines.length<2)return[];
  const hdr=lines[0].split(",").map(h=>h.trim().replace(/"/g,""));
  return lines.slice(1).map(l=>{const v=l.split(",").map(x=>x.trim().replace(/"/g,""));const o={};hdr.forEach((h,i)=>{o[h]=v[i]||""});return o});
}

// ==========================================
// RENDERING ENGINE
// ==========================================
function t(key){return T[lang][key]||key}
function isAr(){return lang==="ar"}

function pill(text,color,bg){return `<span class="pill" style="background:${bg||color+'18'};color:${color}">${text}</span>`}
function statBox(v,l,s,big){return `<div class="stat-box${big?' big':''}"><div class="stat-val">${v}</div><div class="stat-label">${l}</div>${s?`<div class="stat-sub">${s}</div>`:''}</div>`}

function renderTradeTable(data,containerId){
  const h=t('tHead');
  let html=`<table class="data-table"><thead><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>`;
  data.forEach(r=>{
    const pc=r.pnl>=0?'var(--green)':'var(--red)';
    const rc=r.result==='WIN'?'var(--green)':'var(--red)';
    const rbg=r.result==='WIN'?'rgba(22,101,52,0.27)':'rgba(127,29,29,0.27)';
    const dc=r.direction==='LONG'?'var(--green)':'var(--red)';
    html+=`<tr><td style="font-weight:700">${r.coin}</td><td>${pill(r.direction,dc)}</td><td style="color:var(--text-dim)">${r.entry}</td><td style="color:var(--text-dim)">${r.exit||'—'}</td><td style="font-weight:700;color:${pc}">${r.pnl>=0?'+':''}${r.pnl}%</td><td style="color:var(--gold)">${r.mu}%</td><td>${pill(r.result,rc,rbg)}</td></tr>`;
  });
  html+='</tbody></table>';
  document.getElementById(containerId).innerHTML=html;
}

  const sl=isAr()?tx.stepLabel:'Step';

  pcHtml+=`<a href="https://t.me/flowentry3" target="_blank" style="display:block;margin-top:16px;border:1px solid var(--text-dim);border-radius:10px;padding:10px 0;text-align:center;font-size:13px;font-weight:700;color:var(--text-dim)">${tx.freeCta}</a></div>`;

  pcHtml+=`<a href="https://t.me/theproff2" target="_blank" style="display:block;margin-top:16px;background:var(--gold);border-radius:10px;padding:10px 0;text-align:center;font-size:13px;font-weight:700;color:var(--bg)">${tx.eliteCta}</a></div>`;
  document.getElementById('priceCards').innerHTML=pcHtml;

  // Founder
  document.getElementById('founderBox').innerHTML=`<div style="font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:6px">${tx.founderTag}</div><div style="font-size:18px;font-weight:800;margin-bottom:6px">${tx.founderTitle}</div><div style="font-size:13px;color:var(--text-dim);line-height:1.6;max-width:480px;margin:0 auto 12px">${tx.founderDesc}</div><div style="background:var(--accent1);border-radius:10px;padding:10px 20px;display:inline-block"><div style="font-size:11px;color:var(--text-dim)">${tx.founderLabel}</div><div style="font-size:22px;font-weight:800;color:var(--gold)">${tx.founderPrice}<span style="font-size:12px;font-weight:400">${tx.founderPer}</span></div></div>`;

function renderCoins(){
  const tx=T[lang];
  const coins=coinTab==='top30'?COINS_TOP:COINS_ALL;
  const q=(document.getElementById('coinSearch').value||'').toLowerCase();
  let filtered=coins.filter(x=>x.coin.toLowerCase().includes(q));
  filtered.sort((a,b)=>sortDir==='desc'?b[sortCol]-a[sortCol]:a[sortCol]-b[sortCol]);

  const keys=['coin','rating','detect5','avgMU','trades','winRate','totalPnl'];
  let html='<table class="data-table"><thead><tr><th style="width:30px"></th>';
  tx.coinH.forEach((h,i)=>{
    const k=keys[i];const s=k!=='coin';
    html+=`<th class="${s?'sortable':''} ${sortCol===k?'sorted':''}" ${s?`onclick="sortCoins('${k}')"`:''} >${h} ${sortCol===k?(sortDir==='desc'?'↓':'↑'):''}</th>`;
  });
  html+='</tr></thead><tbody>';
  filtered.forEach((x,i)=>{
    const detC=x.detect5>=70?'var(--green)':x.detect5>=50?'#eab308':'var(--red)';
    const pnlC=x.totalPnl>=0?'var(--green)':'var(--red)';
    const ratC=x.rating>=7?'var(--green)':x.rating>=5?'#eab308':'var(--text-dim)';
    const checked=compareList.includes(x.coin)?'checked':'';
    html+=`<tr><td><input type="checkbox" ${checked} onchange="toggleCmp('${x.coin}')" style="accent-color:var(--gold);cursor:pointer"></td><td style="font-weight:700">${x.coin}</td><td><span style="color:${ratC};font-weight:700">${x.rating}</span></td><td><span class="det-bar"><span class="det-fill" style="width:${x.detect5}%;background:${detC}"></span></span><span style="font-size:11px;font-weight:600;color:var(--text-dim)">${x.detect5}%</span></td><td style="color:var(--gold);font-weight:600">${x.avgMU}%</td><td style="color:var(--text-dim)">${x.trades}</td><td style="color:${x.winRate>=50?'var(--green)':'var(--text-dim)'}">${x.winRate}%</td><td style="font-weight:700;color:${pnlC}">${x.totalPnl>=0?'+':''}${x.totalPnl}%</td></tr>`;
  });
  html+='</tbody></table>';
  document.getElementById('coinTableContainer').innerHTML=html;
  document.getElementById('coinNote').textContent=coinTab==='top30'?tx.top30Note:COINS_ALL.length+tx.allNote;

  // Compare button
  const cb=document.getElementById('compareBtn');
  if(compareList.length>0){cb.style.display='';cb.textContent=tx.compare+' ('+compareList.length+')';cb.className='tab-btn'+(showCompare?' active':'');} else {cb.style.display='none';showCompare=false}

  // Compare panel
  if(showCompare&&compareList.length>0){
    const cc=coins.filter(x=>compareList.includes(x.coin));
    document.getElementById('comparePanel').style.display='';
    document.getElementById('comparePanel').innerHTML=`<div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:12px">${tx.compare}</div><div class="flex gap-12" style="overflow-x:auto">${cc.map(x=>`<div class="compare-card"><div style="font-size:16px;font-weight:800;color:var(--gold);margin-bottom:10px">${x.coin}</div><div style="font-size:12px;color:var(--text-dim);margin-bottom:4px">Rating: <span style="color:var(--text);font-weight:700">${x.rating}/10</span></div><div style="font-size:12px;color:var(--text-dim);margin-bottom:4px">Detection 5%+: <span style="color:var(--green);font-weight:700">${x.detect5}%</span></div><div style="font-size:12px;color:var(--text-dim);margin-bottom:4px">Avg Move: <span style="color:var(--gold);font-weight:700">${x.avgMU}%</span></div><div style="font-size:12px;color:var(--text-dim);margin-bottom:4px">Trades: <span style="color:var(--text);font-weight:700">${x.trades}</span></div><div style="font-size:12px;color:var(--text-dim)">Total P&L: <span style="color:${x.totalPnl>=0?'var(--green)':'var(--red)'};font-weight:700">${x.totalPnl>=0?'+':''}${x.totalPnl}%</span></div></div>`).join('')}</div>`;
  } else {document.getElementById('comparePanel').style.display='none'}
}

// ==========================================
// ACTIONS
// ==========================================
function goPage(i){currentPage=i;renderAll();window.scrollTo(0,0)}
function toggleLang(){lang=lang==='en'?'ar':'en';renderAll()}
function setSimTP(i){simTP=i;renderAll()}
function setCoinTab(t){coinTab=t;renderAll()}
function sortCoins(col){if(sortCol===col)sortDir=sortDir==='desc'?'asc':'desc';else{sortCol=col;sortDir='desc'}renderCoins()}
function toggleCmp(coin){if(compareList.includes(coin))compareList=compareList.filter(x=>x!==coin);else if(compareList.length<3)compareList.push(coin);renderCoins()}
function toggleComparePanel(){showCompare=!showCompare;renderCoins()}
function toggleFaq(i){const el=document.getElementById('faq'+i);el.classList.toggle('open')}

// ==========================================
// LIVE DATA FETCH
// ==========================================
async function fetchLiveData(){
  try{
    const otRes=await fetch(csvUrl(GIDS.openTrades));
    if(otRes.ok){const rows=parseCSV(await otRes.text());if(rows.length>0){liveTrades=rows.map(r=>({coin:r.Coin||r.coin||'—',direction:r.Direction||r.direction||'—',entry:r['Entry Date']||r.entry_date||'—',entryPrice:r['Entry Price']||r.entry_price||'—',zone:`${r['Zone Low']||r.zone_low||'?'} – ${r['Zone High']||r.zone_high||'?'}`,unrealized:r['Live P&L %']?`${parseFloat(r['Live P&L %'])>=0?'+':''}${r['Live P&L %']}%`:'—',status:'ACTIVE'}))}}

    const wRes=await fetch(csvUrl(GIDS.watching));
    if(wRes.ok){const rows=parseCSV(await wRes.text());if(rows.length>0){liveWatching=rows.map(r=>({coin:r.Coin||r.coin||'—',zone:`${r['Zone Low']||r.zone_low||'?'} – ${r['Zone High']||r.zone_high||'?'}`,sigma:r.Sigma||r.sigma||'—',since:r['Alert Date']||r.alert_date||'—'}))}}

    const trRes=await fetch(csvUrl(GIDS.trackRecord));
    if(trRes.ok){const rows=parseCSV(await trRes.text());if(rows.length>0){liveRecent=rows.slice(0,10).map(r=>({coin:r.Coin||r.coin||'—',direction:r.Direction||r.direction||'—',entry:r['Entry Date']||r.entry_date||'—',exit:r['Exit Date']||r.exit_date||'—',pnl:parseFloat(r['P&L %']||r.pnl_percent||0),mu:parseFloat(r['Max Unrealized %']||r.max_unrealized_pct||0),result:r.Result||r.status||'—'}))}}

    lastFetch=new Date();fetchOk=true;countdown=REFRESH_SEC;
  }catch(e){console.warn('Fetch error:',e);fetchOk=false}
  renderAll();
}

// ==========================================
// INIT
// ==========================================
// Initial render (loading state)
renderAll();

// Safety net: ALWAYS dismiss loading after 5 seconds no matter what
setTimeout(dismissLoading, 5000);

// Check Elite access, then fetch live data
(async function init(){
  if(!tgUserId){
    // Not in Telegram — dismiss immediately, show as free
    dismissLoading();
  } else {
    await checkEliteAccess();
  }
  await fetchLiveData();
  renderAll();
})();

setInterval(fetchLiveData, REFRESH_SEC*1000);
setInterval(()=>{countdown=Math.max(0,countdown-1);const s=document.getElementById('liveStatus');if(s&&lastFetch){const tx=T[lang];s.innerHTML=`<span class="live-dot ok"></span>${tx.lastUpdated}: ${lastFetch.toLocaleTimeString()} · ${countdown}s`}},1000);
</script>
